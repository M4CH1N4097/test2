/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function linkSvg(){
  return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`;
}

/* 룰별 tag 색상 클래스 */
function rollClass(roll){
  if(roll.includes('CoC'))  return 'coc';
  if(roll.includes('SW'))   return 'sw';
  if(roll.includes('인세인')) return 'ins';
  return 'gold';
}

function tagHtml(t, cls=''){ return `<span class="tag ${cls}">${t}</span>`; }

function rollTagHtml(roll){ return tagHtml(roll, rollClass(roll)); }

/* ══════════════════════════════════════════
   PC CARD
══════════════════════════════════════════ */
function pcCardHtml(pc){
  const icons = pc.icons.slice(0,3);
  return `
  <div class="pc-card" onclick="go('/pc/${pc.id}')"
       role="button" tabindex="0" aria-label="${pc.name} 프로필 보기">
    <div class="pc-thumb">
      ${pc.img ? `<img src="${pc.img}" alt="${pc.name} 일러스트">` : `<span class="thumb-ph" aria-hidden="true">🎭</span>`}
      <span class="pc-roll-lbl" aria-hidden="true">${pc.roll}</span>
      <div class="pc-icons-ov" aria-hidden="true">
        ${icons.map(ic=>`<span class="pc-icon-txt">${ic}</span>`).join('')}
      </div>
    </div>
    <div class="pc-bot">
      <span class="ruby">${pc.ruby}</span>
      <div class="pc-name">${pc.name}</div>
      <div class="aff">· ${pc.aff} ·</div>
    </div>
  </div>`;
}

function renderCards(list){
  return list.length
    ? list.map(pcCardHtml).join('')
    : `<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--text-dim);font-size:13px;">검색 결과가 없습니다</div>`;
}

/* ══════════════════════════════════════════
   HOME PAGE
══════════════════════════════════════════ */

    </div>
    <div class="owner-r">
      <div class="row-tags">
        ${owner.tags.map((t,i)=>tagHtml(t,i<2?'gold':'blue')).join('')}

      <div class="bio">${bioHtml}</div>
      <div class="row-sns">
        ${owner.sns.map(s=>`<a href="${s.url}" class="sns-a">${linkSvg()} ${s.label}</a>`).join('')}

/* ══════════════════════════════════════════

══════════════════════════════════════════ */
function pagePc(id){
  const pc = pcs.find(p=>p.id===+id);
  if(!pc) return `<div class="ph-page"><div class="ph-title">404</div><p class="ph-sub">캐릭터를 찾을 수 없습니다.</p><br><a href="#/" style="color:var(--gold);font-size:13px;">← 돌아가기</a></div>`;

  const rc = rollClass(pc.roll);
  const hasBgm = !!(pc.bgm?.src);
  const bgmTitle = pc.bgm?.title ?? '등록된 곡 없음';
  return `
  <a href="#/" class="detail-back">← PC 목록</a>

  <!-- Character Music Player -->
  <div class="pc-player">
    <div class="pc-player-btns">
      <button class="pc-player-btn" id="pc-prev" aria-label="이전">&#9664;&#9664;</button>
      <button class="pc-player-btn pp" id="pc-play" aria-label="재생/일시정지" ${!hasBgm ? 'disabled style="opacity:.35;cursor:default;"' : ''}>&#9654;</button>
      <button class="pc-player-btn" id="pc-next" aria-label="다음">&#9654;&#9654;</button>
    </div>
    <div class="pc-player-info">
      <div class="pc-player-label">CHARACTER BGM</div>
      <div class="pc-player-title" id="pc-player-title">${bgmTitle}</div>
    </div>
    <div class="pc-player-bar-wrap" id="pc-bar-wrap">
      <div class="pc-player-bar-fill" id="pc-bar-fill"></div>
    </div>
    <div class="pc-player-vol">🔊<input type="range" min="0" max="100" value="70" id="pc-vol" aria-label="볼륨" /></div>
  </div>

  <!-- Hero: reference-sheet layout -->
  <div class="d-hero">

    <!-- 전신 이미지 (bg) -->
    <div class="dh-fullbody">
      ${pc.img
        ? `<img src="${pc.img}" alt="${pc.name} 전신">`
        : `<span class="dh-fullbody-ph">🎭</span>`}
    </div>

    <!-- 좌상단: 「alias」 -->
    <div class="dh-alias-block">
      <div class="dh-alias-name">「${pc.alias || pc.name}」</div>
      <div class="dh-alias-ruby">${pc.aliasRuby || pc.ruby}</div>
    </div>

    <!-- 우측: 인적사항 배지 -->
    <div class="dh-badges">
      ${Object.entries(pc.info||{}).map(([,v])=>
        `<span class="dh-badge">${v}</span>`).join('')}
    </div>

    <!-- 좌측 열: 포트레이트 슬롯 (4개) -->
    <div class="dh-portraits">
      ${[...Array(4)].map((_,i)=>{
        const src=(pc.portraits||[])[i]||null;
        return `<div class="dh-portrait-slot">
          ${src?`<img src="${src}" alt="포트레이트${i+1}">`:''}
        </div>`;
      }).join('')}
    </div>

    <!-- 우측 열: 컬러 팔레트 스와치 -->
    <div class="dh-swatches">
      ${[...Array(4)].map((_,i)=>{
        const c=(pc.colors||[])[i]||null;
        return `<div class="dh-swatch" style="${c?`background:${c}`:''}" title="${c||''}"></div>`;
      }).join('')}
    </div>

    <!-- 중앙 오버레이: 한마디 (하이라이트) -->
    ${pc.quote ? `<div class="dh-quotes">
      ${pc.quote.split('\\n').slice(0,3).map(line=>
        `<div class="dh-quote-line">${line}</div>`).join('')}
    </div>` : ''}

    <!-- 우하단: 캐릭터 이름 -->
    <div class="dh-name-block">
      <div class="dh-char-name">${pc.name}</div>
      <div class="dh-char-ruby">${pc.ruby}</div>
    </div>

    <!-- 우하단: SD 이미지 -->
    <div class="dh-sd">
      ${pc.imgSD?`<img src="${pc.imgSD}" alt="SD">`:'🎨'}

    <!-- 좌하단: 룰 + 시나리오 + 캐치프레이즈 -->
    <div class="dh-bottom-l">
      <div class="dh-meta">
        <span>${pc.roll}</span>
        ${pc.scenario?`<span>${pc.scenario}</span>`:''}
      </div>
      <div class="dh-catchphrase">${pc.catchphrase||''}</div>
    </div>

  </div>

  <!-- Tabs -->
  <div class="d-tabs">
    <div class="tab-nav">
      <button class="tab-btn on" data-tab="profile">프로필</button>
      <button class="tab-btn" data-tab="sheet">시트</button>
      <button class="tab-btn" data-tab="log">플레이 로그</button>
    </div>
    <div class="tab-body" id="tab-body">${tabContent('profile', pc)}</div>
  </div>`;
}

/* ══════════════════════════════════════════
   TAB CONTENT
══════════════════════════════════════════ */
function tabContent(tab, pc){
  switch(tab){
    case 'profile': return tabProfile(pc);
    case 'sheet':   return tabSheet(pc);
    case 'log':     return tabLog(pc);
    default:        return tabProfile(pc);
  }
}

function tabProfile(pc){
  return `<div class="tab-ph">프로필 내용이 없습니다.<br><span style="font-size:11px;color:var(--text-dim);">구글 시트에서 불러올 예정</span></div>`;
}

/* ── 시트: 룰별 분기 ── */
function tabSheet(pc){
  switch(pc.roll){
    case 'CoC 7판': return sheetCoc(pc);
    case 'SW2.5':   return sheetSw(pc);
    case '인세인':  return sheetInsane(pc);
    default: return `<div class="tab-ph">지원하지 않는 룰입니다.<br><span style="font-size:11px;color:var(--text-dim);">${pc.roll}</span></div>`;
  }
}

/* ── CoC 7판 시트 ── */

/* ══════════════════════════════════════════
   STATE & FILTER
══════════════════════════════════════════ */
const state = { rules:new Set(), sort:'id-asc', filters:new Set(), q:'' };

function applyFilters(){
  let list = [...pcs];
  if(state.rules.size > 0) list = list.filter(p=>state.rules.has(p.roll));
  if(state.q){
    const q = state.q.toLowerCase();
    list = list.filter(p=>
      p.name.toLowerCase().includes(q) || p.aff.toLowerCase().includes(q) ||
      p.roll.toLowerCase().includes(q) || p.ruby.toLowerCase().includes(q));
  }
  if(state.sort==='id-asc')  list.sort((a,b)=>a.id-b.id);
  if(state.sort==='id-desc') list.sort((a,b)=>b.id-a.id);
  if(state.sort==='name')    list.sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  if(state.sort==='roll')    list.sort((a,b)=>a.roll.localeCompare(b.roll,'ko'));
  return list;
}

function refreshGrid(){ const g=document.getElementById('pc-grid'); if(g) g.innerHTML=renderCards(applyFilters()); }

/* ══════════════════════════════════════════
   EVENT BINDINGS
══════════════════════════════════════════ */
function bindHomeEvents(){
  /* 룰 복수 선택 */
  document.querySelectorAll('#chip-rule .chip').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const val=btn.dataset.val, all=document.querySelector('#chip-rule .chip[data-val="전체"]');
      if(val==='전체'){
        state.rules.clear();
        document.querySelectorAll('#chip-rule .chip').forEach(b=>b.classList.remove('on'));
        btn.classList.add('on');
      } else {
        all?.classList.remove('on');
        btn.classList.toggle('on');
        btn.classList.contains('on') ? state.rules.add(val) : state.rules.delete(val);
        if(state.rules.size===0) all?.classList.add('on');
      }
      refreshGrid();
    });
  });
  /* 정렬 단일 선택 */
  document.querySelectorAll('#chip-sort .chip').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('#chip-sort .chip').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on'); state.sort=btn.dataset.val; refreshGrid();
    });
  });
  /* 필터 복수 선택 */
  document.querySelectorAll('#chip-filter .chip').forEach(btn=>{
    btn.addEventListener('click',()=>{
      btn.classList.toggle('on');
      btn.classList.contains('on') ? state.filters.add(btn.dataset.val) : state.filters.delete(btn.dataset.val);
      refreshGrid();
    });
  });
  /* 검색 */
  const si=document.getElementById('pc-search');
  if(si){ si.value=state.q; si.addEventListener('input',e=>{ state.q=e.target.value.trim(); refreshGrid(); }); }
  /* 카드 키보드 */
  document.querySelectorAll('.pc-card').forEach(c=>c.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' ') c.click(); }));
}

function bindPcEvents(id){
  const pc=pcs.find(p=>p.id===+id); if(!pc) return;

  /* ── 탭 전환 ── */
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      document.getElementById('tab-body').innerHTML = tabContent(btn.dataset.tab, pc);
    });
  });

  /* ── 캐릭터 BGM 플레이어 ── */
  const playBtn  = document.getElementById('pc-play');
  const barFill  = document.getElementById('pc-bar-fill');
  const volInput = document.getElementById('pc-vol');
  if(!playBtn) return;

  /* 전용 audio 엘리먼트 (전역 BGM과 별개) */
  let pcAudio = document.getElementById('pc-audio');
  if(!pcAudio){
    pcAudio = document.createElement('audio');
    pcAudio.id = 'pc-audio';
    document.body.appendChild(pcAudio);
  }

  if(pc.bgm?.src){
    pcAudio.src = pc.bgm.src;
    pcAudio.volume = (volInput?.value ?? 70) / 100;
  }

  let playing = false;

  playBtn.addEventListener('click', ()=>{
    if(!pc.bgm?.src) return;
    if(playing){ pcAudio.pause(); playBtn.innerHTML='&#9654;'; }
    else        { pcAudio.play().catch(()=>{}); playBtn.innerHTML='&#9646;&#9646;'; }
    playing = !playing;
  });

  pcAudio.addEventListener('timeupdate', ()=>{
    if(pcAudio.duration && barFill)
      barFill.style.width = (pcAudio.currentTime / pcAudio.duration * 100) + '%';
  });

  pcAudio.addEventListener('ended', ()=>{
    playing = false;
    if(playBtn) playBtn.innerHTML = '&#9654;';
  });

  volInput?.addEventListener('input', e=>{
    pcAudio.volume = e.target.value / 100;
  });

  /* 페이지 이동 시 재생 중단 */
  const stopOnLeave = ()=>{ pcAudio.pause(); playing=false; };
  window.addEventListener('hashchange', stopOnLeave, { once: true });
}

/* ══════════════════════════════════════════
   ROUTER
══════════════════════════════════════════ */
function go(path){ location.hash='#'+path; }

function render(){
  const hash=location.hash.replace('#','')||'/';
  const app=document.getElementById('app');
  const pcMatch=hash.match(/^\/pc\/(\d+)$/);
  if(pcMatch){ app.innerHTML=pagePc(pcMatch[1]); bindPcEvents(pcMatch[1]); return; }
  const pages={'/' :pageHome,'/notice':pageNotice,'/users':pageUsers};
  app.innerHTML=(pages[hash]||pageHome)();
  if(hash==='/') bindHomeEvents();
}

window.addEventListener('hashchange',render);
window.addEventListener('load',render);

/* ══════════════════════════════════════════
   BGM
══════════════════════════════════════════ */
const audio=document.getElementById('bgm-audio');
const playBtn=document.getElementById('bgm-play');
const prog=document.getElementById('bgm-prog');
let playing=false;

playBtn.addEventListener('click',()=>{
  if(!audio.src||audio.src===window.location.href) return;
  if(playing){ audio.pause(); playBtn.innerHTML='&#9654;'; }
  else        { audio.play().catch(()=>{}); playBtn.innerHTML='&#9646;&#9646;'; }
  playing=!playing;
});
document.getElementById('bgm-vol-input').addEventListener('input',e=>{ audio.volume=e.target.value/100; });
audio.addEventListener('timeupdate',()=>{ if(audio.duration) prog.style.width=(audio.currentTime/audio.duration*100)+'%'; });
audio.addEventListener('ended',()=>{ playing=false; playBtn.innerHTML='&#9654;'; });
</script>
