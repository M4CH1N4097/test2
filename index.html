<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TRPG 캐릭터 페이지</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── BGM BAR ── -->
<header class="bgm" role="banner">
  <button class="bgm-btn" id="bgm-prev" aria-label="이전">&#9664;&#9664;</button>
  <button class="bgm-btn play" id="bgm-play" aria-label="재생/일시정지">&#9654;</button>
  <button class="bgm-btn" id="bgm-next" aria-label="다음">&#9654;&#9654;</button>
  <div class="bgm-info">
    <div class="bgm-label">BGM</div>
    <div class="bgm-title" id="bgm-title">재생 중인 곡이 없습니다</div>
  </div>
  <div class="bgm-bar-wrap"><div class="bgm-bar-fill" id="bgm-prog"></div></div>
  <div class="bgm-vol">
    🔊
    <input type="range" min="0" max="100" value="70" id="bgm-vol-input" aria-label="볼륨" />
  </div>
</header>

<!-- ── APP ── -->
<main id="app"></main>

<!-- ── BOTTOM NAV ── -->
<nav class="nav" aria-label="페이지 메뉴">
  <a href="#/"       class="nav-a" data-p="home">   ⬡ 홈</a>
  <a href="#/notice" class="nav-a" data-p="notice">  📋 공지</a>
  <a href="#/users"  class="nav-a" data-p="users">   👥 유저 목록</a>
</nav>

<!-- ── AUDIO (숨김) ── -->
<audio id="bgm-audio" loop></audio>

<script>
/* ══════════════════════════════════════════════
   DATA  —  나중에 Google Sheets API 로 교체 예정
══════════════════════════════════════════════ */
const owner = {
  nick:   "닉네임",
  avatar: null,
  tags:   ["CoC 7판", "SW2.5", "이런 느낌으로", "여러개 가능", "쉼표로 구분"],
  bio:    "플레이어 소개 텍스트가 여기에 들어갑니다.\n너무 길지 않게 작성하는 것을 권장해요.\n취향이나 플레이 스타일 등을 자유롭게 적어 주세요.",
  links:  [
    { label: "성향표", url: "#" },
    { label: "일정표", url: "#" },
  ],
  sns: [
    { label: "Twitter / X", url: "#" },
    { label: "Misskey",     url: "#" },
    { label: "Discord",     url: "#" },
  ]
};

/*  icons 배열 길이로 레이아웃이 달라집니다.
    - 1개  →  아이콘이 썸네일 위에 오버레이,  썸네일 풀사이즈
    - 2~3개 →  오른쪽 세로 열에 아이콘 나열             */
const pcs = [
  { id:1,  roll:"CoC 7판", icons:["🎲"],            name:"아리아",  ruby:"アリア",  aff:"탐정 사무소",  tags:["성인","여성","탐정"],       bio:"오래된 도시의 뒷골목을 무대로 활동하는 사립탐정. 날카로운 직관으로 사건을 해결한다.",                   born:"19??.??.??", height:"163cm", img:null },
  { id:2,  roll:"SW2.5",  icons:["⚔️","🗡️"],      name:"루카스",  ruby:"ルーカス", aff:"모험자 길드",  tags:["성인","남성","전사"],       bio:"북부 출신의 젊은 전사. 동료를 위해서라면 망설임 없이 방패가 된다.",                                   born:"22세",       height:"182cm", img:null },
  { id:3,  roll:"CoC 7판", icons:["🎲","💊"],       name:"하나",    ruby:"ハナ",    aff:"대학교 의대",  tags:["성인","여성","의대생"],     bio:"의대 3학년생. 평범해 보이지만 알 수 없는 사건에 몇 번이고 휘말리는 운명을 지닌다.",                    born:"19??.4.7",   height:"157cm", img:null },
  { id:4,  roll:"인세인",  icons:["🌀","🎭","⚡"], name:"세이버",  ruby:"セイバー", aff:"미상",         tags:["성별불명","비밀"],         bio:"어둠 속에서 나타나 사건을 해결하고 사라지는 수수께끼의 인물.",                                         born:"미상",       height:"미상",  img:null },
  { id:5,  roll:"CoC 7판", icons:["🎲"],            name:"레이나",  ruby:"レイナ",  aff:"무직",         tags:["성인","여성","백수"],       bio:"특별한 직업은 없지만 인맥이 넓고 정보 수집에 뛰어나다.",                                              born:"19??.9.15",  height:"168cm", img:null },
  { id:6,  roll:"SW2.5",  icons:["⚔️","🛡️"],     name:"클레어",  ruby:"クレア",  aff:"왕국 기사단",  tags:["성인","여성","기사"],       bio:"왕국 최연소 기사 중 한 명. 정의감이 넘치고 직선적인 성격이다.",                                       born:"20세",       height:"170cm", img:null },
  { id:7,  roll:"인세인",  icons:["🌀"],            name:"미래",    ruby:"ミライ",  aff:"고등학교",     tags:["미성년","여성","고등학생"], bio:"남다른 감수성을 지닌 고등학생. 다른 사람이 보지 못하는 것을 볼 수 있다.",                              born:"17세",       height:"154cm", img:null },
  { id:8,  roll:"CoC 7판", icons:["🎲","📜"],      name:"노아",    ruby:"ノア",    aff:"해외 유학생",  tags:["성인","남성","유학생"],     bio:"해외에서 온 유학생. 한국어는 유창하지만 가끔 묘한 발언을 해서 주변을 당황하게 한다.",                    born:"19??.12.3",  height:"175cm", img:null },
];

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
function linkIcon(){
  return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
  </svg>`;
}

function tagHtml(t, cls=''){
  return `<span class="tag ${cls}">${t}</span>`;
}

/* ══════════════════════════════════════════════
   CARD BUILDER
══════════════════════════════════════════════ */
function pcCardHtml(pc){
  const multi = pc.icons.length > 1;
  const icons = pc.icons.slice(0, 3);

  const iconCol = multi
    ? `<div class="pc-icons" aria-hidden="true">
        ${icons.map(ic=>`<span class="pc-icon">${ic}</span>`).join('')}
       </div>`
    : '';

  const iconOv = !multi
    ? `<span class="pc-icon-ov" aria-hidden="true">${icons[0]}</span>`
    : '';

  const thumbCls = multi ? 'pc-thumb' : 'pc-thumb pc-thumb--full';

  return `
    <div class="pc-card" onclick="go('/pc/${pc.id}')"
         role="button" tabindex="0" aria-label="${pc.name} 프로필 보기">
      <div class="pc-body">
        <div class="${thumbCls}">
          ${pc.img
            ? `<img src="${pc.img}" alt="${pc.name} 일러스트">`
            : `<span class="thumb-ph" aria-hidden="true">🎭</span>`}
          ${iconOv}
        </div>
        ${iconCol}
      </div>
      <div class="pc-bot">
        <span class="ruby">${pc.ruby}</span>
        <div class="pc-name">${pc.name}</div>
        <div class="aff">· ${pc.aff} ·</div>
      </div>
    </div>`;
}

function renderCards(list){
  if(!list.length){
    return `<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--text-dim);font-size:13px;">
              검색 결과가 없습니다
            </div>`;
  }
  return list.map(pcCardHtml).join('');
}

/* ══════════════════════════════════════════════
   PAGES
══════════════════════════════════════════════ */
function pageHome(){
  const bioHtml = owner.bio.replace(/\n/g,'<br>');
  const rolls   = [...new Set(pcs.map(p=>p.roll))];

  return `
  <section class="owner">
    <div class="owner-l">
      <div class="avatar">
        ${owner.avatar ? `<img src="${owner.avatar}" alt="프로필 사진">` : '🎭'}
      </div>
      <div class="nick">${owner.nick}</div>
      <div class="owner-links">
        ${owner.links.map(l=>`
          <a href="${l.url}" class="olink">${linkIcon()} ${l.label}</a>
        `).join('')}
      </div>
    </div>
    <div class="owner-r">
      <div class="row-tags">
        ${owner.tags.map((t,i)=>tagHtml(t, i<2?'gold':'blue')).join('')}
      </div>
      <div class="bio">${bioHtml}</div>
      <div class="row-sns">
        ${owner.sns.map(s=>`
          <a href="${s.url}" class="sns-a">${linkIcon()} ${s.label}</a>
        `).join('')}
      </div>
    </div>
  </section>

  <section class="pcs">
    <div class="pcs-head">PC 리스트</div>
    <div class="ctrl-area">

      <div class="ctrl-row">
        <span class="ctrl-lbl">룰</span>
        <div class="chip-group" id="chip-rule">
          <button class="chip on" data-val="전체">전체</button>
          ${rolls.map(r=>`<button class="chip" data-val="${r}">${r}</button>`).join('')}
        </div>
      </div>

      <div class="ctrl-row">
        <span class="ctrl-lbl">정렬</span>
        <div class="chip-group" id="chip-sort">
          <button class="chip on" data-val="id-asc">등록 ↑</button>
          <button class="chip" data-val="id-desc">등록 ↓</button>
          <button class="chip" data-val="name">이름순</button>
          <button class="chip" data-val="roll">룰이름순</button>
        </div>
      </div>

      <div class="ctrl-row">
        <span class="ctrl-lbl">필터</span>
        <div class="chip-group" id="chip-filter">
          <button class="chip f" data-val="전신">전신 유무</button>
          <button class="chip f" data-val="SD">SD 유무</button>
          <button class="chip f" data-val="스탠딩">스탠딩 유무</button>
        </div>
      </div>

      <div class="ctrl-row">
        <span class="ctrl-lbl">검색</span>
        <div class="search-w">
          <input type="text" id="pc-search"
            placeholder="이름, 소속, 룰 검색…" autocomplete="off" />
          <span class="search-hint">캐릭터 정보 범위 내 검색</span>
        </div>
      </div>

    </div>

    <div class="pc-grid-wrap">
      <div class="pc-grid" id="pc-grid">
        ${renderCards(pcs)}
      </div>
    </div>
  </section>`;
}

function pageNotice(){
  return `<div class="ph-page">
    <div class="ph-title">공 지 사 항</div>
    <p class="ph-sub">공지 페이지는 준비 중입니다.</p>
  </div>`;
}

function pageUsers(){
  return `<div class="ph-page">
    <div class="ph-title">유 저 목 록</div>
    <p class="ph-sub">유저 목록 페이지는 준비 중입니다.</p>
  </div>`;
}

function pagePc(id){
  const pc = pcs.find(p=>p.id===+id);
  if(!pc) return `<div class="ph-page">
    <div class="ph-title">404</div>
    <p class="ph-sub">캐릭터를 찾을 수 없습니다.</p>
    <br><a href="#/" style="color:var(--gold);font-size:13px;">← 돌아가기</a>
  </div>`;

  return `
  <a href="#/" class="detail-back">← PC 목록으로</a>
  <div class="detail-wrap">
    <div class="detail-img">
      ${pc.img
        ? `<img src="${pc.img}" alt="${pc.name} 일러스트">`
        : `<span class="detail-ph" aria-hidden="true">🎭</span>`}
    </div>
    <div class="detail-info">
      <div class="detail-name-area">
        <div class="detail-ruby">${pc.ruby}</div>
        <div class="detail-name">${pc.name}</div>
        <div class="detail-aff">${pc.aff}</div>
        <div class="detail-tags">
          ${tagHtml(pc.roll,'gold')}
          ${pc.tags.map(t=>tagHtml(t)).join('')}
        </div>
      </div>
      <div class="info-row"><span class="info-key">소개</span>    <span class="info-val">${pc.bio}</span></div>
      <div class="info-row"><span class="info-key">생년월일</span><span class="info-val">${pc.born}</span></div>
      <div class="info-row"><span class="info-key">신장</span>    <span class="info-val">${pc.height}</span></div>
      <div class="info-row"><span class="info-key">소속</span>    <span class="info-val">${pc.aff}</span></div>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════
   STATE & FILTER
══════════════════════════════════════════════ */
const state = {
  rules:   new Set(),   /* 빈 Set = 전체 */
  sort:    'id-asc',
  filters: new Set(),
  q:       ''
};

function applyFilters(){
  let list = [...pcs];
  if(state.rules.size > 0)
    list = list.filter(p => state.rules.has(p.roll));
  if(state.q){
    const q = state.q.toLowerCase();
    list = list.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.aff.toLowerCase().includes(q)  ||
      p.roll.toLowerCase().includes(q) ||
      p.ruby.toLowerCase().includes(q)
    );
  }
  if(state.sort==='id-asc')  list.sort((a,b)=>a.id-b.id);
  if(state.sort==='id-desc') list.sort((a,b)=>b.id-a.id);
  if(state.sort==='name')    list.sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  if(state.sort==='roll')    list.sort((a,b)=>a.roll.localeCompare(b.roll,'ko'));
  return list;
}

function refreshGrid(){
  const grid = document.getElementById('pc-grid');
  if(grid) grid.innerHTML = renderCards(applyFilters());
}

/* ══════════════════════════════════════════════
   HOME EVENTS
══════════════════════════════════════════════ */
function bindHomeEvents(){

  /* 룰 — 복수 선택 ("전체" 선택 시 나머지 해제) */
  document.querySelectorAll('#chip-rule .chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const val    = btn.dataset.val;
      const allBtn = document.querySelector('#chip-rule .chip[data-val="전체"]');

      if(val === '전체'){
        state.rules.clear();
        document.querySelectorAll('#chip-rule .chip').forEach(b=>b.classList.remove('on'));
        btn.classList.add('on');
      } else {
        allBtn?.classList.remove('on');
        btn.classList.toggle('on');
        if(btn.classList.contains('on')) state.rules.add(val);
        else                             state.rules.delete(val);
        if(state.rules.size === 0) allBtn?.classList.add('on');
      }
      refreshGrid();
    });
  });

  /* 정렬 — 단일 선택 */
  document.querySelectorAll('#chip-sort .chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('#chip-sort .chip').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      state.sort = btn.dataset.val;
      refreshGrid();
    });
  });

  /* 필터 — 복수 선택 */
  document.querySelectorAll('#chip-filter .chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      btn.classList.toggle('on');
      if(btn.classList.contains('on')) state.filters.add(btn.dataset.val);
      else                             state.filters.delete(btn.dataset.val);
      refreshGrid();
    });
  });

  /* 검색 */
  const si = document.getElementById('pc-search');
  if(si){
    si.value = state.q;
    si.addEventListener('input', e=>{ state.q=e.target.value.trim(); refreshGrid(); });
  }

  /* 카드 키보드 접근성 */
  document.querySelectorAll('.pc-card').forEach(card=>{
    card.addEventListener('keydown', e=>{
      if(e.key==='Enter'||e.key===' ') card.click();
    });
  });
}

/* ══════════════════════════════════════════════
   ROUTER
══════════════════════════════════════════════ */
function go(path){ location.hash = '#' + path; }

function render(){
  const hash = location.hash.replace('#','') || '/';
  const app  = document.getElementById('app');

  document.querySelectorAll('.nav-a').forEach(a=>{
    const p = a.dataset.p;
    a.classList.toggle('on',
      (hash==='/'                  && p==='home')   ||
      (hash.startsWith('/notice') && p==='notice') ||
      (hash.startsWith('/users')  && p==='users')
    );
  });

  const pcMatch = hash.match(/^\/pc\/(\d+)$/);
  if(pcMatch){ app.innerHTML = pagePc(pcMatch[1]); return; }

  const pages = { '/':pageHome, '/notice':pageNotice, '/users':pageUsers };
  app.innerHTML = (pages[hash] || pageHome)();
  if(hash==='/') bindHomeEvents();
}

window.addEventListener('hashchange', render);
window.addEventListener('load', render);

/* ══════════════════════════════════════════════
   BGM
══════════════════════════════════════════════ */
const audio   = document.getElementById('bgm-audio');
const playBtn = document.getElementById('bgm-play');
const prog    = document.getElementById('bgm-prog');
let playing   = false;

playBtn.addEventListener('click', ()=>{
  if(!audio.src || audio.src === window.location.href) return;
  if(playing){ audio.pause(); playBtn.innerHTML='&#9654;'; }
  else        { audio.play().catch(()=>{}); playBtn.innerHTML='&#9646;&#9646;'; }
  playing = !playing;
});

document.getElementById('bgm-vol-input').addEventListener('input', e=>{
  audio.volume = e.target.value / 100;
});

audio.addEventListener('timeupdate', ()=>{
  if(audio.duration)
    prog.style.width = (audio.currentTime / audio.duration * 100) + '%';
});

audio.addEventListener('ended', ()=>{ playing=false; playBtn.innerHTML='&#9654;'; });
</script>
</body>
</html>
