<!DOCTYPE html>

<body>

<!-- ── BGM BAR ── -->
<header class="bgm" role="banner">
  <button class="bgm-btn" id="bgm-prev" aria-label="이전">&#9664;&#9664;</button>
  <button class="bgm-btn play" id="bgm-play" aria-label="재생/일시정지">&#9654;</button>

</header>

<main id="app"></main>
<!-- YouTube player divs (hidden) -->
<div id="yt-bgm" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;left:-9999px;"></div>
<div id="yt-pc"  style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;left:-9999px;"></div>

<script src="js/sheets/registry.js"></script>
<script>
/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function linkSvg(){
  return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`;
}
function tagHtml(t, cls=''){ return `<span class="tag ${cls}">${t}</span>`; }
function rollTagHtml(ruleName){ return tagHtml(ruleName, 'gold'); }

/* ══════════════════════════════════════════
   PC CARD
══════════════════════════════════════════ */
function pcCardHtml(pc){
  const icons = (pc.icons||[]).slice(0,3);
  return `
  <div class="pc-card" onclick="go('/pc/${pc.id}')"
       role="button" tabindex="0" aria-label="${pc.name} 프로필 보기">
    <div class="pc-thumb">
      ${pc.thumbnail
        ? `<img src="${pc.thumbnail}" alt="${pc.name} 썸네일">`
        : `<span class="thumb-ph" aria-hidden="true">🎭</span>`}
      <span class="pc-roll-lbl" aria-hidden="true">${pc.ruleName}</span>
      ${pc.passwordId>=1&&!isPasswordUnlocked(pc.passwordId)?`<span class="pc-lock-badge" aria-label="비밀번호 보호">🔒</span>`:''}
      <div class="pc-icons-ov" aria-hidden="true">
        ${icons.map(ic=>`<span class="pc-icon-txt">${ic}</span>`).join('')}
      </div>
    </div>
    <div class="pc-bot">
      <span class="ruby">${pc.ruby}</span>
      <div class="pc-name">${pc.name}</div>
      <div class="aff">· ${pc.aff} ·</div>
    </div>
  </div>`;
}

function renderCards(list){
  return list.length
    ? list.map(pcCardHtml).join('')
    : `<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--text-dim);font-size:13px;">검색 결과가 없습니다</div>`;
}

/* ══════════════════════════════════════════
   HOME PAGE
══════════════════════════════════════════ */
function pageHome(){
  const owner = buildOwner();
  const bioHtml = (owner.bio||'').replace(/\n/g,'<br>');
  /* Onoff=true 인 룰만 필터 칩에 표시 */
  const visibleRules = AppData.rules.filter(r=>r.onoff);

  return `
  <section class="owner">
    <div class="owner-l">
      <div class="avatar">
        ${owner.avatar ? `<img src="${owner.avatar}" alt="프사">` : '🎭'}
      </div>
      <div class="nick">${owner.nick||'닉네임'}</div>
      <div class="owner-links">
        ${owner.links.map(l=>`<a href="${l.url}" class="olink">${linkSvg()} ${l.label}</a>`).join('')}
      </div>
    </div>
    <div class="owner-r">
      <div class="row-tags">
        ${owner.tags.map((t,i)=>tagHtml(t,i<2?'gold':'blue')).join('')}
      </div>
      <div class="bio">${bioHtml}</div>
      <div class="row-sns">
        ${owner.sns.map(s=>`<a href="${s.url}" class="sns-a">${linkSvg()} ${s.label}</a>`).join('')}
      </div>
    </div>
  </section>

  <div class="owner-deco">
    <span class="owner-deco-inner">✦ &nbsp; ◆ &nbsp; ✦</span>
  </div>

  <section class="pcs">
    <div class="pcs-head">PC 리스트</div>
    <div class="ctrl-area">

      <div class="ctrl-row">
        <span class="ctrl-lbl">룰</span>
        <div class="chip-group" id="chip-rule">
          <button class="chip on" data-val="__ALL__">전체</button>
          ${visibleRules.map(r=>`<button class="chip" data-val="${r.tabName}">${r.ruleName}</button>`).join('')}
        </div>
      </div>

      <div class="ctrl-row">
        <span class="ctrl-lbl">정렬</span>
        <div class="chip-group" id="chip-sort">
          <button class="chip on" data-val="id-asc">등록 ↑</button>
          <button class="chip" data-val="id-desc">등록 ↓</button>
          <button class="chip" data-val="name">이름순</button>
          <button class="chip" data-val="roll">룰이름순</button>
        </div>
      </div>

      <div class="ctrl-row">
        <span class="ctrl-lbl">필터</span>
        <div class="chip-group" id="chip-filter">
          <button class="chip f" data-val="fav">즐겨찾기</button>
          <button class="chip f" data-val="fb_o">전신 O</button>
          <button class="chip f" data-val="fb_x">전신 X</button>
          <button class="chip f" data-val="sd_o">SD O</button>
          <button class="chip f" data-val="sd_x">SD X</button>
          <button class="chip f" data-val="st_o">스탠딩 O</button>
          <button class="chip f" data-val="st_x">스탠딩 X</button>
        </div>
      </div>

      <div class="ctrl-row">
        <span class="ctrl-lbl">검색</span>
        <div class="search-w">
          <input type="text" id="pc-search" placeholder="이름, 소속, 룰 검색…" autocomplete="off" />
          <span class="search-hint">캐릭터 정보 범위 내 검색</span>
        </div>
      </div>

    </div>
  </section>

  <div class="pc-grid-wrap">
    <div class="pc-grid" id="pc-grid">${renderCards(applyFilters())}</div>
  </div>`;
}

/* ══════════════════════════════════════════
   DETAIL PAGE — hero HTML builder
══════════════════════════════════════════ */
function buildHeroHtml(pc, hero, images){
  /* 인적사항 배지: extractHero()가 "/" 구분 분리해서 배열로 줌 */
  const badges     = hero.infoBadges  || [];
  const quoteLines = hero.quoteLines  || [];
  /* 이명 없으면 이름으로 fallback */
  const aliasDisplay = hero.alias    || hero.name || pc.name;
  const aliasRuby    = hero.aliasRuby || hero.nameRuby || pc.ruby;

  return `
  <div class="d-hero">
    <div class="dh-fullbody">
      ${images.fullbody
        ? `<img src="${images.fullbody}" alt="${pc.name} 전신">`
        : `<span class="dh-fullbody-ph">🎭</span>`}
    </div>
    <div class="dh-alias-block">
      <div class="dh-alias-name">「${aliasDisplay}」</div>
      <div class="dh-alias-ruby">${aliasRuby}</div>
    </div>
    <div class="dh-badges">
      ${badges.map(v=>`<span class="dh-badge">${v}</span>`).join('')}
    </div>
    <div class="dh-portrait-col">
      <button class="dh-port-arrow" id="port-up" aria-label="위로">▲</button>
      <div class="dh-portraits" id="dh-portraits"></div>
      <button class="dh-port-arrow" id="port-dn" aria-label="아래로">▼</button>
    </div>
    <div class="dh-swatches">
      ${[...Array(4)].map((_,i)=>`<div class="dh-swatch"></div>`).join('')}
    </div>
    ${quoteLines.length ? `<div class="dh-quotes">
      ${quoteLines.slice(0,3).map(l=>`<div class="dh-quote-line">${l}</div>`).join('')}
    </div>` : ''}
    <div class="dh-name-block">
      <div class="dh-char-name">${hero.name||pc.name}</div>
      <div class="dh-char-ruby">${hero.nameRuby||pc.ruby}</div>
    </div>
    <div class="dh-sd">
      ${images.imgSd?`<img src="${images.imgSd}" alt="SD">`:'🎨'}
    </div>
    <div class="dh-bottom-l">
      <div class="dh-meta">
        <span>${pc.ruleName}</span>
        ${(hero.aff||pc.aff)?`<span>${hero.aff||pc.aff}</span>`:''}
      </div>
      <div class="dh-catchphrase">${hero.catchphrase||''}</div>
    </div>
  </div>`;
}

function buildPcPageHtml(pc, hero, images){
  const hasBgm = !!(hero.bgm?.src);
  const bgmTitle = hero.bgm?.title || '등록된 곡 없음';
  const bgmSub   = hero.bgm?.composer ? ` — ${hero.bgm.composer}` : '';

  return `
  <a href="#/" class="detail-back">← PC 목록</a>

  <div class="pc-player">
    <div class="pc-player-btns">
      <button class="pc-player-btn" id="pc-prev">&#9664;&#9664;</button>
      <button class="pc-player-btn pp" id="pc-play"
        ${!hasBgm?'disabled style="opacity:.35;cursor:default;"':''}
      >&#9654;</button>
      <button class="pc-player-btn" id="pc-next">&#9654;&#9654;</button>
    </div>
    <div class="pc-player-info">
      <div class="pc-player-label">CHARACTER BGM</div>
      <div class="pc-player-title">${bgmTitle}${bgmSub}</div>
    </div>
    <div class="pc-player-bar-wrap">
      <div class="pc-player-bar-fill" id="pc-bar-fill"></div>
    </div>
    <div class="pc-player-vol">🔊<input type="range" min="0" max="100" value="70" id="pc-vol" /></div>
  </div>

  ${buildHeroHtml(pc, hero, images)}

  <div class="d-tabs">
    <div class="tab-nav">
      <button class="tab-btn on" data-tab="profile">프로필</button>
      <button class="tab-btn" data-tab="sheet">시트</button>
      <button class="tab-btn" data-tab="log">플레이 로그</button>

/* ══════════════════════════════════════════
   TAB CONTENT
══════════════════════════════════════════ */
function tabContent(tab, pc){
  switch(tab){
    case 'profile': return tabProfile(pc);
    case 'sheet':   return tabSheet(pc);
    case 'log':     return tabLogPlaceholder(pc);
    default:        return tabProfile(pc);
  }
}

/* 프로필 탭: TabGroup=3 데이터를 DataType별로 렌더 */
function tabProfile(pc){
  const g3 = pc.detail?.g3 || [];
  if(!g3.length) return `<div class="tab-ph">프로필 내용이 없습니다.</div>`;

  return g3.map(r => {
    const dt  = DATATYPE[r.DataType]; /* 숫자 ID → 이름 문자열 */
    const esc = s => (s||'').replace(/\n/g,'<br>');

    switch(dt){
      /* ── Universal ── */
      case 'SECTION':
        return `<div class="prof-section">${r.Data1}</div>`;
      case 'SUBSECTION':
        return `<div class="prof-subsection">${r.Data1}</div>`;
      case 'CONTENT':
        return `<div class="prof-content">${esc(r.Data1)}</div>`;

      /* ── CoC: 공포증·집착증 ── */
      case 'COC_PHOBIA':
        return `<div class="prof-block">
          <div class="prof-block-ttl">공포증·집착증</div>
          <div class="prof-content">${esc(r.Data1)}</div>
        </div>`;

      /* ── CoC: 신화서·주문·유물 / 기이한존재 / 장비 ── */
      case 'COC_MYTH':
      case 'COC_ENTITY':
      case 'COC_EQUIP': {
        const label = dt==='COC_MYTH'?'신화서·주문·유물':dt==='COC_ENTITY'?'기이한 존재':'장비·소지품';
        return `<div class="prof-list-item">
          <span class="prof-item-name">${r.Data1}</span>
          ${r.Data2?`<span class="prof-item-desc">${esc(r.Data2)}</span>`:''}
        </div>`;
      }

      /* ── CoC: 현금·자산 ── */
      case 'COC_FINANCE':
        return `<div class="prof-block">
          <div class="prof-block-ttl">현금·자산</div>
          <div style="display:flex;gap:16px;font-size:13px;">
            ${r.Data1?`<div><div class="prof-label">소비수준</div><div>${r.Data1}</div></div>`:''}
            ${r.Data2?`<div><div class="prof-label">현금</div><div>${r.Data2}</div></div>`:''}
            ${r.Data3?`<div><div class="prof-label">자산</div><div>${r.Data3}</div></div>`:''}
          </div>
        </div>`;

      /* ── CoC: 동료 탐사자들 ── */
      case 'COC_ALLY':
        return `<div class="prof-list-item" style="align-items:center;gap:10px;">
          ${r.Data4?`<img src="${r.Data4}" alt="" style="width:36px;height:36px;border-radius:3px;object-fit:cover;border:1px solid rgba(0,0,0,.1);">`:''}
          <div>
            <div class="prof-item-name">${r.Data1}</div>
            <div class="prof-item-desc" style="font-size:11px;">${r.Data2||''}</div>
          </div>
          ${r.Data3?`<a href="${r.Data3}" target="_blank" style="margin-left:auto;font-size:11px;color:var(--text-dim);">↗</a>`:''}
        </div>`;

      /* ── inSANe: 공개사명 ── */
      case 'INS_MISSION':
        return `<div class="prof-block">
          <div class="prof-block-ttl">공개 사명</div>
          <div class="prof-content">${esc(r.Data1)}</div>
        </div>`;

      /* ── inSANe: 비밀사명 ── */
      case 'INS_SECRET':
        return `<div class="prof-block">
          <div class="prof-block-ttl">비밀 사명</div>
          <div class="prof-content">${esc(r.Data1)}</div>
          ${r.Data2?`<div class="prof-label" style="margin-top:6px;">쇼크: ${r.Data2}</div>`:''}
        </div>`;

      /* ── 알 수 없는 DataType: 원시 렌더 ── */
      default:
        return r.Data1 ? `<div class="prof-content">${esc(r.Data1)}</div>` : '';
    }
  }).join('');
}

/* 시트 탭: TabGroup=4 데이터를 SheetRegistry로 전달 */
function tabSheet(pc){
  if(pc.detail) pc.sheetData = pc.detail.g4;
  const cached = SheetRegistry.render(pc.rule, pc);
  if(cached !== null) return cached;

  SheetRegistry.load(pc.rule, success=>{
    const body = document.getElementById('tab-body');
    if(!body) return;
    if(success){
      if(pc.detail) pc.sheetData = pc.detail.g4;
      body.innerHTML = SheetRegistry.render(pc.rule, pc)
        || `<div class="tab-ph">시트 렌더링 오류</div>`;
    } else {
      const fn = SheetRegistry.filename(pc.rule)+'.js';
      body.innerHTML = `<div class="tab-ph">「${pc.rule}」 시트 파일 없음<br>
        <span style="font-size:11px;color:var(--text-dim);">js/sheets/${fn}</span></div>`;
    }
  });
  return `<div class="tab-ph" style="color:var(--text-dim);">시트 로딩 중…</div>`;
}

/* 플레이 로그 탭: Log 탭 비동기 로드 */
function tabLogPlaceholder(pc){
  loadLogs(pc.rule, pc.charaId).then(logs=>{
    const body = document.getElementById('tab-body');
    if(!body) return;
    if(!logs.length){
      body.innerHTML = `<div class="tab-ph">플레이 로그가 없습니다.</div>`;
      return;
    }
    body.innerHTML = logs.map(l=>`
      <div class="log-item">
        <div class="log-meta">${l.Date||''}</div>
        <div class="log-title">${l.Title||l.Data1||''}</div>
      </div>`).join('');
  }).catch(()=>{
    const body = document.getElementById('tab-body');
    if(body) body.innerHTML = `<div class="tab-ph">로그 로드 실패</div>`;
  });
  return `<div class="tab-ph" style="color:var(--text-dim);">로그 로딩 중…</div>`;
}

}
function pageUsers(){
  return `<div class="ph-page"><div class="ph-title">유 저 목 록</div><p class="ph-sub">준비 중입니다.</p></div>`;
}

/* ══════════════════════════════════════════
   STATE & FILTER
══════════════════════════════════════════ */
const state = { rules:new Set(), sort:'id-asc', filters:new Set(), q:'' };

function applyFilters(){
  let list = [...AppData.pcs];

  /* 룰 필터 */
  if(state.rules.size>0) list = list.filter(p=>state.rules.has(p.rule));

  /* 이미지 필터 */
  if(state.filters.has('fav'))  list = list.filter(p=>p.favorit);
  if(state.filters.has('fb_o')) list = list.filter(p=>p.hasFullbody===true);
  if(state.filters.has('fb_x')) list = list.filter(p=>p.hasFullbody===false);
  if(state.filters.has('sd_o')) list = list.filter(p=>p.hasSd===true);
  if(state.filters.has('sd_x')) list = list.filter(p=>p.hasSd===false);
  if(state.filters.has('st_o')) list = list.filter(p=>p.hasStanding===true);
  if(state.filters.has('st_x')) list = list.filter(p=>p.hasStanding===false);

  /* 검색 */
  if(state.q){
    const q=state.q.toLowerCase();
    list=list.filter(p=>
      p.name.toLowerCase().includes(q)||
      p.aff.toLowerCase().includes(q)||
      p.ruleName.toLowerCase().includes(q)||
      p.ruby.toLowerCase().includes(q));
  }

  /* 정렬 */
  if(state.sort==='id-asc')  list.sort((a,b)=>String(a.id).localeCompare(String(b.id)));
  if(state.sort==='id-desc') list.sort((a,b)=>String(b.id).localeCompare(String(a.id)));
  if(state.sort==='name')    list.sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  if(state.sort==='roll')    list.sort((a,b)=>a.ruleName.localeCompare(b.ruleName,'ko'));
  return list;
}

function refreshGrid(){
  const g=document.getElementById('pc-grid');
  if(g) g.innerHTML=renderCards(applyFilters());
}

/* ══════════════════════════════════════════
   BIND HOME
══════════════════════════════════════════ */
function bindHomeEvents(){
  /* 룰 복수 선택 */
  document.querySelectorAll('#chip-rule .chip').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const val=btn.dataset.val;
      const allBtn=document.querySelector('#chip-rule .chip[data-val="__ALL__"]');
      if(val==='__ALL__'){
        state.rules.clear();
        document.querySelectorAll('#chip-rule .chip').forEach(b=>b.classList.remove('on'));
        btn.classList.add('on');
      } else {
        allBtn?.classList.remove('on');
        btn.classList.toggle('on');
        btn.classList.contains('on')?state.rules.add(val):state.rules.delete(val);
        if(state.rules.size===0) allBtn?.classList.add('on');
      }
      refreshGrid();
    });
  });
  /* 정렬 단일 */
  document.querySelectorAll('#chip-sort .chip').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('#chip-sort .chip').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on'); state.sort=btn.dataset.val; refreshGrid();
    });
  });
  /* 필터 복수 */
  document.querySelectorAll('#chip-filter .chip').forEach(btn=>{
    btn.addEventListener('click',()=>{
      btn.classList.toggle('on');
      btn.classList.contains('on')?state.filters.add(btn.dataset.val):state.filters.delete(btn.dataset.val);
      refreshGrid();
    });
  });
  /* 검색 */
  const si=document.getElementById('pc-search');
  if(si){ si.value=state.q; si.addEventListener('input',e=>{state.q=e.target.value.trim();refreshGrid();}); }
  document.querySelectorAll('.pc-card').forEach(c=>c.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')c.click();}));
}

/* ══════════════════════════════════════════
   BIND PC EVENTS
══════════════════════════════════════════ */
async function bindPcEvents(pc){
  /* 탭 */
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      document.getElementById('tab-body').innerHTML=tabContent(btn.dataset.tab,pc);
    });
  });

  /* 포트레이트 페이지네이션 */
  const PAGE=4;
  const portraits=pc.detail?extractImages(pc.detail.g2).portraits:[];
  let offset=0;

  function renderPortraits(){
    const wrap=document.getElementById('dh-portraits');
    const up=document.getElementById('port-up');
    const dn=document.getElementById('port-dn');
    if(!wrap)return;
    wrap.innerHTML=[...Array(PAGE)].map((_,i)=>{
      const src=portraits[offset+i]||null;
      return `<div class="dh-portrait-slot">${src?`<img src="${src}" alt="">`:''}`;
    }).join('');
    if(up)up.disabled=offset<=0;
    if(dn)dn.disabled=offset+PAGE>=Math.max(portraits.length,PAGE);
  }
  renderPortraits();
  document.getElementById('port-up')?.addEventListener('click',()=>{if(offset>0){offset--;renderPortraits();}});
  document.getElementById('port-dn')?.addEventListener('click',()=>{if(offset+PAGE<Math.max(portraits.length,PAGE)){offset++;renderPortraits();}});

  /* 캐릭터 BGM (YouTube) */
  const bgm = pc.detail ? extractHero(pc.detail.g1).bgm : null;
  const playBtn  = document.getElementById('pc-play');
  const barFill  = document.getElementById('pc-bar-fill');
  const volInput = document.getElementById('pc-vol');
  if(!playBtn||!bgm?.src) return;

  const ytId = extractYtId(bgm.src);
  let pcYt=null, pcPlaying=false;

  playBtn.addEventListener('click',()=>{
    whenYtReady(()=>{
      if(!pcYt){
        pcYt=new YT.Player('yt-pc',{
          videoId:ytId,
          playerVars:{autoplay:1,playsinline:1},
          events:{
            onStateChange(e){
              pcPlaying=(e.data===YT.PlayerState.PLAYING);
              playBtn.innerHTML=pcPlaying?'&#9646;&#9646;':'&#9654;';
            }
          }
        });
        return;
      }
      pcPlaying?pcYt.pauseVideo():pcYt.playVideo();
    });
  });

  volInput?.addEventListener('input',e=>pcYt?.setVolume(+e.target.value));

  const progTimer=setInterval(()=>{
    if(pcYt&&pcPlaying&&barFill&&pcYt.getDuration){
      const t=pcYt.getCurrentTime(),d=pcYt.getDuration();
      if(d>0)barFill.style.width=(t/d*100)+'%';
    }
  },500);

  window.addEventListener('hashchange',()=>{
    clearInterval(progTimer);
    pcYt?.stopVideo();
  },{once:true});
}

/* ══════════════════════════════════════════
   ROUTER
══════════════════════════════════════════ */
function go(path){ location.hash='#'+path; }

async function render(){
  const hash=location.hash.replace('#','')||'/';
  const app=document.getElementById('app');
  if(!AppData.ready) return;

  /* PC 상세 */
  const pcMatch=hash.match(/^\/pc\/(.+)$/);
  if(pcMatch){
    const id=decodeURIComponent(pcMatch[1]);
    const pc=AppData.pcs.find(p=>p.id===id);
    if(!pc){
      app.innerHTML=`<div class="ph-page"><div class="ph-title">404</div><p class="ph-sub">캐릭터를 찾을 수 없습니다.</p><br><a href="#/" style="font-size:13px;">← 돌아가기</a></div>`;
      return;
    }

    /* ── 비밀번호 보호 확인 ── */
    if(!isPasswordUnlocked(pc.passwordId)){
      showCharPassword(pc);
      return;
    }

    /* ── 데이터 로드 ── */
    app.innerHTML=`<div class="ph-page"><div class="ph-title" style="font-size:18px;letter-spacing:2px;">로딩 중…</div></div>`;
    try{
      await loadCharaDetail(pc);
      const hero   = extractHero(pc.detail.g1);
      const images = extractImages(pc.detail.g2);
      app.innerHTML = buildPcPageHtml(pc, hero, images);
      await bindPcEvents(pc);
    }catch(e){
      app.innerHTML=`<div class="ph-page"><div class="ph-title">로드 실패</div><p class="ph-sub">${e.message}</p></div>`;
    }
    return;
  }

  const pages={'/' :pageHome,'/notice':pageNotice,'/users':pageUsers};
  app.innerHTML=(pages[hash]||pageHome)();
  if(hash==='/') bindHomeEvents();
}

window.addEventListener('hashchange',render);

let _ytReady=false;
let _ytQueue=[];
function onYouTubeIframeAPIReady(){ _ytReady=true; _ytQueue.forEach(fn=>fn()); _ytQueue=[]; }
function whenYtReady(fn){ _ytReady?fn():_ytQueue.push(fn); }

/* 전역 BGM YouTube 플레이어 */
let bgmYt=null, bgmPlaying=false;

function initGlobalBgm(ownerBgm){
  const titleEl=document.getElementById('bgm-title');
  const playBtn=document.getElementById('bgm-play');
  const prog   =document.getElementById('bgm-prog');
  const volIn  =document.getElementById('bgm-vol-input');
  if(!ownerBgm?.src) return;

  const ytId=extractYtId(ownerBgm.src);
  if(titleEl) titleEl.textContent=ownerBgm.title+(ownerBgm.composer?` — ${ownerBgm.composer}`:'');

  playBtn.addEventListener('click',()=>{
    whenYtReady(()=>{
      if(!bgmYt){
        bgmYt=new YT.Player('yt-bgm',{
          videoId:ytId,
          playerVars:{autoplay:1,loop:1,playlist:ytId,playsinline:1},
          events:{
            onReady(e){ e.target.setVolume(+volIn.value); },
            onStateChange(e){
              bgmPlaying=(e.data===YT.PlayerState.PLAYING);
              playBtn.innerHTML=bgmPlaying?'&#9646;&#9646;':'&#9654;';
            }
          }
        });
        return;
      }
      bgmPlaying?bgmYt.pauseVideo():bgmYt.playVideo();
    });
  });

  volIn?.addEventListener('input',e=>bgmYt?.setVolume(+e.target.value));
  setInterval(()=>{
    if(bgmYt&&bgmPlaying&&prog&&bgmYt.getDuration){
      const t=bgmYt.getCurrentTime(),d=bgmYt.getDuration();
      if(d>0)prog.style.width=(t/d*100)+'%';
    }
  },500);
}

/* ══════════════════════════════════════════
   캐릭터 비밀번호 화면
══════════════════════════════════════════ */
function showCharPassword(pc){
  const app=document.getElementById('app');
  app.innerHTML=`
  <a href="#/" class="detail-back">← PC 목록</a>
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-title">${pc.name}</div>
      <div class="login-sub">비밀번호가 설정된 캐릭터입니다</div>
      <div class="login-hint" id="char-hint"></div>
      <input type="password" class="login-input" id="char-pw"
        placeholder="···" autocomplete="off" />
      <button class="login-btn" id="char-pw-btn">확 &nbsp; 인</button>
      <div class="login-err" id="char-pw-err"></div>
    </div>
  </div>`;

  /* 힌트 비동기 로드 */
  fetchCharHint(pc.passwordId).then(hint => {
    const el = document.getElementById('char-hint');
    if (el && hint) el.textContent = hint;
  });

  const pw  = document.getElementById('char-pw');
  const btn = document.getElementById('char-pw-btn');
  const err = document.getElementById('char-pw-err');

  async function tryUnlock(){
    btn.disabled=true; btn.textContent='확인 중…'; err.textContent='';
    try{
      await verifyCharPassword(pc.passwordId, pw.value);
      unlockPassword(pc.passwordId);
      await render();
    }catch(e){
      err.textContent=e.message;
      btn.disabled=false; btn.textContent='확 　 인';
      pw.select();
    }
  }
  btn.addEventListener('click', tryUnlock);
  pw.addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });
  setTimeout(()=>pw.focus(), 50);
}
